services:
  ngr-postgres:
    image: postgres:18.3
    container_name: ngr-postgres
    shm_size: 128mb
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: ngr_admin
      POSTGRES_PASSWORD: ngr_password
    volumes:
      # Alterado de /var/lib/postgresql/data para /var/lib/postgresql
      - postgres_data:/var/lib/postgresql
    networks:
      - ngr-network
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ngr_admin -d keycloak_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: ngr-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://ngr-postgres:5432/keycloak_db
      KC_DB_USERNAME: ngr_admin
      KC_DB_PASSWORD: ngr_password
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./keycloak-config:/opt/keycloak/data/import/
    ports:
      - "8080:8080"
    depends_on:
      ngr-postgres:
        condition: service_healthy
    networks:
      - ngr-network

networks:
  ngr-network:
    driver: bridge

volumes:
  postgres_data: